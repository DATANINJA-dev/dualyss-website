# CTA Registry - Dualys Website
# Single source of truth for all cross-page CTA relationships
# Used by: validate-cta-mapping.js hook, navigation validation, UX journey audits

version: "1.0"
last_updated: "2026-03-01"
locales: [en, fr, es, de, it, ca]

# === CAPABILITY → SECTOR (CTAs on capability pages) ===
# Maps each capability page's CTAs to their destinations
capability_to_sector:
  defense:
    file: "app/[locale]/capabilities/defense/page.tsx"
    primary_cta:
      destination: "/contact"
      label: "Discuss Your Requirements"
      semantic_match: high
    secondary_ctas:
      - destination: "/capabilities/dual-use"
        label: "Explore Dual-Use"
        semantic_match: high
      - destination: "/sectors"
        label: "View Sectors"
        semantic_match: medium

  cybersecurity:
    file: "app/[locale]/capabilities/cybersecurity/page.tsx"
    primary_cta:
      destination: "/contact"
      label: "Request Assessment"
      semantic_match: high
    secondary_ctas:
      - destination: "/capabilities/defense"
        label: "Defense Integration"
        semantic_match: high
      - destination: "/about/partners"
        label: "Partner Ecosystem"
        semantic_match: medium

  biosecurity:
    file: "app/[locale]/capabilities/biosecurity/page.tsx"
    primary_cta:
      destination: "/contact"
      label: "Discuss Capabilities"
      semantic_match: high
    secondary_ctas:
      - destination: "/capabilities/dual-use"
        label: "Dual Applications"
        semantic_match: high
      - destination: "/news"
        label: "Latest Insights"
        semantic_match: medium

  dual-use:
    file: "app/[locale]/capabilities/dual-use/page.tsx"
    primary_cta:
      destination: "/contact"
      label: "Partner With Us"
      semantic_match: high
    secondary_ctas:
      - destination: "/capabilities/defense"
        label: "Defense Applications"
        semantic_match: high
      - destination: "/capabilities/cybersecurity"
        label: "Cyber Applications"
        semantic_match: high
      - destination: "/capabilities/biosecurity"
        label: "Bio Applications"
        semantic_match: high

# === SECTOR → CAPABILITY (CTAs on sector pages) ===
sector_to_capability:
  institutional:
    file: "app/[locale]/sectors/page.tsx"
    section: "institutional"
    related_capabilities:
      - "/capabilities/defense"
      - "/capabilities/cybersecurity"
    cta:
      destination: "/contact"
      label: "European Programs"
      semantic_match: high

  industrial:
    file: "app/[locale]/sectors/page.tsx"
    section: "industrial"
    related_capabilities:
      - "/capabilities/dual-use"
      - "/capabilities/defense"
    cta:
      destination: "/contact"
      label: "Partnership Inquiry"
      semantic_match: high

  academic:
    file: "app/[locale]/sectors/page.tsx"
    section: "academic"
    related_capabilities:
      - "/capabilities/biosecurity"
      - "/capabilities/dual-use"
    cta:
      destination: "/contact"
      label: "Research Collaboration"
      semantic_match: high

# === HEADER NAVIGATION ===
header:
  file: "components/layout/Header.tsx"
  main_nav:
    - { path: "/", label: "home" }
    - { path: "/about", label: "about" }
    - { path: "/capabilities", label: "capabilities" }
    - { path: "/sectors", label: "sectors" }
    - { path: "/news", label: "news" }
  cta:
    path: "/contact"
    label: "contact"
    variant: "primary"

# === FOOTER NAVIGATION ===
footer:
  file: "components/layout/Footer.tsx"
  sections:
    quick_links:
      - "/about"
      - "/capabilities"
      - "/sectors"
      - "/news"
      - "/contact"
    legal:
      - "/legal/privacy"
      - "/legal/terms"
      - "/legal/cookies"

# === PAGE CTA MATRIX ===
# Quick reference for all primary CTAs across pages
page_ctas:
  # Core pages
  "/":
    primary:
      destination: "/capabilities"
      label: "Explore Capabilities"
    secondary:
      destination: "/contact"
      label: "Contact Us"

  "/about":
    primary:
      destination: "/about/partners"
      label: "Our Partners"
    secondary:
      destination: "/contact"
      label: "Get in Touch"

  "/about/team":
    primary:
      destination: "/contact"
      label: "Work With Us"

  "/about/partners":
    primary:
      destination: "/contact"
      label: "Become a Partner"

  "/capabilities":
    primary:
      destination: "/contact"
      label: "Discuss Your Needs"
    capabilities_grid:
      - { destination: "/capabilities/defense", label: "Defense" }
      - { destination: "/capabilities/cybersecurity", label: "Cybersecurity" }
      - { destination: "/capabilities/biosecurity", label: "Biosecurity" }
      - { destination: "/capabilities/dual-use", label: "Dual-Use" }

  "/sectors":
    primary:
      destination: "/contact"
      label: "Partner Inquiry"

  "/news":
    primary:
      destination: "/contact"
      label: "Stay Informed"

  "/contact":
    primary:
      type: "form"
      action: "submit"

# === JOURNEY STAGE MAPPING ===
# Maps pages to customer journey stages for UX validation
journey_stages:
  awareness:
    - "/"
    - "/about"
    - "/news"
    - "/news/*"

  consideration:
    - "/capabilities"
    - "/capabilities/*"
    - "/sectors"
    - "/about/partners"

  decision:
    - "/contact"
    - "/about/team"

# === VALIDATION RULES ===
validation_rules:
  - rule: "all_destinations_exist"
    description: "Every CTA destination must resolve to an existing page"
    severity: error

  - rule: "primary_cta_present"
    description: "Every content page must have a primary CTA"
    severity: warning

  - rule: "contact_reachable"
    description: "Contact page must be reachable within 2 clicks from any page"
    severity: warning

  - rule: "journey_progression"
    description: "CTAs should progress users through the journey (awareness → consideration → decision)"
    severity: info
